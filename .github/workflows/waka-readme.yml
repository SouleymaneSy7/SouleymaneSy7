name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

jobs:
  update-readme:
    name: WakaReadme DevMetrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master # do NOT replace with anything else
        with:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          ### meta
          API_BASE_URL: https://wakatime.com/api
          REPOSITORY: SouleymaneSy7/SouleymaneSy7
          ### content
          SHOW_TITLE: true
          SECTION_NAME: waka
          BLOCKS: ⣀⣄⣤⣦⣶⣷⣿
          CODE_LANG: typescript
          TIME_RANGE: last_30_days
          LANG_COUNT: 10
          SHOW_TIME: true
          SHOW_TOTAL: true
          SHOW_MASKED_TIME: false
          STOP_AT_OTHER: true
          IGNORED_LANGUAGES:
          ### commit
          COMMIT_MESSAGE: "docs(README): update waka-readme graph with new metrics"
          TARGET_BRANCH: main
          TARGET_PATH: README.md
          COMMITTER_NAME: "Souleymane Sy"
          COMMITTER_EMAIL: souleymanesyservices@gmail.com
          AUTHOR_NAME: "Souleymane Sy"
          AUTHOR_EMAIL: souleymanesyservices@gmail.com
